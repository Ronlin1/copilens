<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Brand gradient: cyan → teal → blue → purple → violet -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="30%"  stop-color="#3b82f6"/>
      <stop offset="70%"  stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="zapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded background with brand gradient -->
  <rect width="100" height="100" rx="22" fill="url(#bgGradient)"/>

  <!-- Subtle inner glow ring -->
  <rect width="100" height="100" rx="22" fill="none"
        stroke="rgba(255,255,255,0.15)" stroke-width="3"/>

  <!-- Zap / lightning bolt — white -->
  <path d="M56 18 L28 52 L46 52 L34 82 L68 44 L50 44 L56 18 Z"
        fill="url(#zapGradient)"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="1.5"
        stroke-linejoin="round"/>
</svg>
